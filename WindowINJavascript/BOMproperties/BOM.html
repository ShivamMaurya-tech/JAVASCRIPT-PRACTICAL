<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Javascript Window Object</h1>

    <!-- Start Window Property -->
    
     <button onclick="window.open('https://www.linkedin.com/in/shivam-maurya-dev','_blank')">Navigate</button>
     <!-- End Window Property  -->

     <!-- Start History -->
      <h1>Javascript History Object</h1>
      <button onclick="window.history.back()">Go back</button>
      <button onclick="window.history.forward()">Go Forward</button>
      <button onclick="window.history.go(-1)">Move Forward or Backward</button>
      <!-- End History -->
       <!-- Start Location -->
        <h1>Javascript Location Object</h1>
        <button onclick="location.reload()">Reload the page</button>
        <button onclick="location.replace('https://www.google.com/')">Navigate page using replace</button>
        <button onclick="location.assign('https://www.instagram.com/')"> Navigate page with Assign</button>
        <!-- End Location -->
         <!-- Start Screen -->
          <h1>Javascript Screen Object </h1>
          <p>We will see in console</p>
<!-- End Sreen  -->
 <script> window.alert("Hello How Are You")</script>
</body>
</html>
