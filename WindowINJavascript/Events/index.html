<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Inline Event</h1>
    <!--start Inline Event -->
    <button class="btn1" onclick="alert('Hello')">greetings</button>
    <button class="btn1" ondblclick="alert('Shivam')">greetings again</button>
<button class="btn1" onmouseover="alert('Maurya')">Greetings</button>

<!-- Dom Event Handler -->
    <h1>Dom Event Handler</h1>
    <button class="btn2">greetings</button>
    <button class="btn2 " id="btn22">greetings again</button>

    <h1>addEventListener</h1>
    <button class="btn3">greetings</button>
    <button class="btn3" id="btn32">greetings again</button>
</body>
<script>
document.querySelector('.btn2').onclick=()=>{
    alert('Welcome');
}
document.querySelector('#btn22').onmouseover=()=>{
    alert('Welcome');
}

document.querySelector('.btn3').addEventListener('click',function(){
    alert("Hello My name Is Shivam");
})

document.querySelector('#btn32').addEventListener('click',()=>{
    alert("Hello My name Is Shivam");
})



</script>
</html>
